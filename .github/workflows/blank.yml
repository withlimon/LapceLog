name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build tree-sitter grammars (matrix: Linux / macOS / Windows)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-grammars:
    name: Build grammars (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: so
            prefix: lib
            cc: cc
            flags: -shared -fPIC -O2

          - os: macos-latest
            ext: dylib
            prefix: lib
            cc: cc
            flags: -shared -fPIC -O2

          - os: windows-latest
            ext: dll
            prefix: ""
            cc: cl
            flags: ""   # handled separately via shell: cmd

    steps:
      - uses: actions/checkout@v4

      # ── Clone all three grammars ──────────────────────────────────────
      - name: Clone grammar sources (POSIX)
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-verilog /tmp/ts-verilog
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-c       /tmp/ts-c
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-cpp     /tmp/ts-cpp

      - name: Clone grammar sources (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-verilog C:\ts-verilog
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-c       C:\ts-c
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-cpp     C:\ts-cpp

      # ── Compile (Linux / macOS) ───────────────────────────────────────
      - name: Compile grammars (POSIX)
        if: runner.os != 'Windows'
        run: |
          mkdir -p grammars

          ${{ matrix.cc }} ${{ matrix.flags }} \
            /tmp/ts-verilog/src/parser.c \
            -I /tmp/ts-verilog/src \
            -o grammars/${{ matrix.prefix }}tree-sitter-verilog.${{ matrix.ext }}

          ${{ matrix.cc }} ${{ matrix.flags }} \
            /tmp/ts-c/src/parser.c \
            -I /tmp/ts-c/src \
            -o grammars/${{ matrix.prefix }}tree-sitter-c.${{ matrix.ext }}

          # tree-sitter-cpp depends on the C parser object
          ${{ matrix.cc }} ${{ matrix.flags }} \
            /tmp/ts-cpp/src/parser.c \
            /tmp/ts-c/src/parser.c \
            -I /tmp/ts-cpp/src \
            -I /tmp/ts-c/src \
            -o grammars/${{ matrix.prefix }}tree-sitter-cpp.${{ matrix.ext }}

      # ── Compile (Windows / MSVC) ──────────────────────────────────────
      - name: Compile grammars (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir grammars

          cl /LD /O2 ^
            C:\ts-verilog\src\parser.c ^
            /I C:\ts-verilog\src ^
            /Fe"grammars\tree-sitter-verilog.dll"

          cl /LD /O2 ^
            C:\ts-c\src\parser.c ^
            /I C:\ts-c\src ^
            /Fe"grammars\tree-sitter-c.dll"

          cl /LD /O2 ^
            C:\ts-cpp\src\parser.c ^
            C:\ts-c\src\parser.c ^
            /I C:\ts-cpp\src ^
            /I C:\ts-c\src ^
            /Fe"grammars\tree-sitter-cpp.dll"

      # ── Upload compiled grammars ──────────────────────────────────────
      - name: Upload grammar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grammars-${{ matrix.os }}
          path: grammars/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Pack & publish .volt archives (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Pack & Release
    needs: build-grammars
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all grammar artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Pack Linux .volt
        run: |
          mkdir -p pack-linux/grammars
          cp artifacts/grammars-ubuntu-latest/*.so pack-linux/grammars/
          cp volt.toml pack-linux/
          cd pack-linux && zip -r ../lapce-hdl-linux.volt .

      - name: Pack macOS .volt
        run: |
          mkdir -p pack-macos/grammars
          cp artifacts/grammars-macos-latest/*.dylib pack-macos/grammars/
          cp volt.toml pack-macos/
          cd pack-macos && zip -r ../lapce-hdl-macos.volt .

      - name: Pack Windows .volt
        run: |
          mkdir -p pack-windows/grammars
          cp artifacts/grammars-windows-latest/*.dll pack-windows/grammars/
          cp volt.toml pack-windows/
          cd pack-windows && zip -r ../lapce-hdl-windows.volt .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lapce-hdl-linux.volt
            lapce-hdl-macos.volt
            lapce-hdl-windows.volt
          generate_release_notes: true
