name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build tree-sitter grammars (Windows, MinGW gcc)
# ─────────────────────────────────────────────────────────────────────────────
  build-grammars:
    name: Build grammars (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify compiler
        shell: bash
        run: gcc --version

      - name: Clone grammar sources
        shell: bash
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-verilog ts-verilog
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-c       ts-c
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-cpp     ts-cpp

      - name: List grammar src files
        shell: bash
        run: |
          echo "=== ts-verilog/src ===" && ls ts-verilog/src/
          echo "=== ts-c/src ==="       && ls ts-c/src/
          echo "=== ts-cpp/src ==="     && ls ts-cpp/src/

      # ── Verilog (parser.c only, no external scanner) ──────────────────
      - name: Compile tree-sitter-verilog
        shell: bash
        run: |
          mkdir -p grammars
          gcc -shared -fPIC -O2 \
            ts-verilog/src/parser.c \
            -I ts-verilog/src \
            -o grammars/tree-sitter-verilog.dll

      # ── C (parser.c only, no external scanner) ────────────────────────
      - name: Compile tree-sitter-c
        shell: bash
        run: |
          gcc -shared -fPIC -O2 \
            ts-c/src/parser.c \
            -I ts-c/src \
            -o grammars/tree-sitter-c.dll

      # ── C++ (parser.c + scanner.c — both plain C, use gcc) ────────────
      - name: Compile tree-sitter-cpp
        shell: bash
        run: |
          gcc -shared -fPIC -O2 \
            ts-cpp/src/parser.c \
            ts-cpp/src/scanner.c \
            -I ts-cpp/src \
            -o grammars/tree-sitter-cpp.dll

      - name: Upload grammar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grammars-windows
          path: grammars/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Pack & publish .volt archive (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Pack & Release
    needs: build-grammars
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download grammar artifacts
        uses: actions/download-artifact@v4
        with:
          name: grammars-windows
          path: grammars/

      - name: Pack Windows .volt
        run: |
          mkdir -p pack/grammars
          cp grammars/*.dll pack/grammars/
          cp volt.toml      pack/
          cd pack && zip -r ../lapce-hdl-windows.volt .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lapce-hdl-windows.volt
          generate_release_notes: true
