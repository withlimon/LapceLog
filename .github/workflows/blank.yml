name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build tree-sitter grammars (matrix: Linux / macOS / Windows)
# Uses only cc/gcc — available on all three runners with no setup required.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-grammars:
    name: Build grammars (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib_prefix: lib
            lib_ext: so
            shared_flag: -shared

          - os: macos-latest
            lib_prefix: lib
            lib_ext: dylib
            shared_flag: -dynamiclib

          - os: windows-latest
            lib_prefix: ""
            lib_ext: dll
            shared_flag: -shared   # MinGW gcc supports -shared

    steps:
      - uses: actions/checkout@v4

      # MinGW gcc is pre-installed on windows-latest; verify it is on PATH
      - name: Verify compiler
        run: gcc --version

      # ── Clone grammar sources ─────────────────────────────────────────
      - name: Clone grammar sources
        shell: bash
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-verilog /tmp/ts-verilog
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-c       /tmp/ts-c
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-cpp     /tmp/ts-cpp

      # ── Compile all three grammars ────────────────────────────────────
      - name: Compile grammars
        shell: bash
        run: |
          mkdir -p grammars
          PREFIX=${{ matrix.lib_prefix }}
          EXT=${{ matrix.lib_ext }}
          SHARED=${{ matrix.shared_flag }}

          # Verilog / SystemVerilog
          gcc $SHARED -fPIC -O2 \
            /tmp/ts-verilog/src/parser.c \
            -I /tmp/ts-verilog/src \
            -o grammars/${PREFIX}tree-sitter-verilog.${EXT}

          # C
          gcc $SHARED -fPIC -O2 \
            /tmp/ts-c/src/parser.c \
            -I /tmp/ts-c/src \
            -o grammars/${PREFIX}tree-sitter-c.${EXT}

          # C++ (parser.c links against C parser)
          gcc $SHARED -fPIC -O2 \
            /tmp/ts-cpp/src/parser.c \
            /tmp/ts-c/src/parser.c \
            -I /tmp/ts-cpp/src \
            -I /tmp/ts-c/src \
            -o grammars/${PREFIX}tree-sitter-cpp.${EXT}

      # ── Upload compiled grammars ──────────────────────────────────────
      - name: Upload grammar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grammars-${{ matrix.os }}
          path: grammars/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Pack & publish .volt archives (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Pack & Release
    needs: build-grammars
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all grammar artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Pack Linux .volt
        run: |
          mkdir -p pack-linux/grammars
          cp artifacts/grammars-ubuntu-latest/*.so  pack-linux/grammars/
          cp volt.toml                               pack-linux/
          cd pack-linux && zip -r ../lapce-hdl-linux.volt .

      - name: Pack macOS .volt
        run: |
          mkdir -p pack-macos/grammars
          cp artifacts/grammars-macos-latest/*.dylib pack-macos/grammars/
          cp volt.toml                                pack-macos/
          cd pack-macos && zip -r ../lapce-hdl-macos.volt .

      - name: Pack Windows .volt
        run: |
          mkdir -p pack-windows/grammars
          cp artifacts/grammars-windows-latest/*.dll pack-windows/grammars/
          cp volt.toml                                pack-windows/
          cd pack-windows && zip -r ../lapce-hdl-windows.volt .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lapce-hdl-linux.volt
            lapce-hdl-macos.volt
            lapce-hdl-windows.volt
          generate_release_notes: true
