name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build tree-sitter grammars (Windows only, MinGW gcc/g++)
# ─────────────────────────────────────────────────────────────────────────────
  build-grammars:
    name: Build grammars (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify compilers
        shell: bash
        run: |
          gcc --version
          g++ --version

      # ── Clone grammar sources ─────────────────────────────────────────
      - name: Clone grammar sources
        shell: bash
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-verilog /tmp/ts-verilog
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-c       /tmp/ts-c
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-cpp     /tmp/ts-cpp

      # ── Verilog (parser.c only, no external scanner) ──────────────────
      - name: Compile tree-sitter-verilog
        shell: bash
        run: |
          mkdir -p grammars
          gcc -shared -fPIC -O2 \
            /tmp/ts-verilog/src/parser.c \
            -I /tmp/ts-verilog/src \
            -o grammars/tree-sitter-verilog.dll

      # ── C (parser.c only, no external scanner) ────────────────────────
      - name: Compile tree-sitter-c
        shell: bash
        run: |
          gcc -shared -fPIC -O2 \
            /tmp/ts-c/src/parser.c \
            -I /tmp/ts-c/src \
            -o grammars/tree-sitter-c.dll

      # ── C++ (parser.c + scanner.cc external scanner) ──────────────────
      # tree-sitter-cpp has an external scanner written in C++ that
      # provides the tree_sitter_cpp_external_scanner_* symbols.
      # Compile scanner.cc with g++, then link everything together.
      - name: Compile tree-sitter-cpp
        shell: bash
        run: |
          # Compile the external scanner (C++)
          g++ -c -fPIC -O2 \
            /tmp/ts-cpp/src/scanner.cc \
            -I /tmp/ts-cpp/src \
            -o /tmp/scanner_cpp.o

          # Compile the main parser (C)
          gcc -c -fPIC -O2 \
            /tmp/ts-cpp/src/parser.c \
            -I /tmp/ts-cpp/src \
            -o /tmp/parser_cpp.o

          # Link both into a single DLL (use g++ to pull in C++ runtime)
          g++ -shared -fPIC -O2 \
            /tmp/parser_cpp.o \
            /tmp/scanner_cpp.o \
            -o grammars/tree-sitter-cpp.dll

      # ── Upload compiled grammars ──────────────────────────────────────
      - name: Upload grammar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grammars-windows
          path: grammars/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Pack & publish .volt archive (only on version tags)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Pack & Release
    needs: build-grammars
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download grammar artifacts
        uses: actions/download-artifact@v4
        with:
          name: grammars-windows
          path: grammars/

      - name: Pack Windows .volt
        run: |
          mkdir -p pack/grammars
          cp grammars/*.dll pack/grammars/
          cp volt.toml      pack/
          cd pack && zip -r ../lapce-hdl-windows.volt .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lapce-hdl-windows.volt
          generate_release_notes: true
